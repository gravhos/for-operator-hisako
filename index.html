        }

        /* FASE 1: BOTÓN OPEN /
        #pantalla-inicio {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        #btnOpen {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #btnOpen:hover { background: white; color: black; }
